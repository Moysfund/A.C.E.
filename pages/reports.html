<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Reports - A.C.E.</title>
    <link rel="stylesheet" href="../styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        .report-filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .report-filters input,
        .report-filters select {
            padding: 0.6rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            color: #eef2f8;
            font-family: 'Inter', sans-serif;
            flex: 1;
            min-width: 150px;
        }
        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .report-table th {
            text-align: left;
            padding: 0.8rem 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #5a6f92;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }
        .report-table td {
            padding: 0.8rem 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .report-table tr:hover td {
            background: rgba(0, 212, 255, 0.02);
        }
        .report-table .status-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .status-badge.submitted {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }
        .status-badge.pending {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }
        .status-badge.contravention {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }
        .report-table .actions button {
            background: none;
            border: none;
            color: #5a6f92;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            transition: 0.2s;
        }
        .report-table .actions button:hover {
            color: #00d4ff;
        }
        .lasbca-badge {
            background: #00d4ff;
            color: #0b0f1a;
            padding: 3px 14px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            display: inline-block;
            text-transform: uppercase;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #5a6f92;
        }
        .empty-state i {
            font-size: 3rem;
            color: #00d4ff;
            opacity: 0.3;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Top Navigation -->
    <div class="top-bar" style="position:fixed;top:0;left:0;right:0;z-index:50;">
        <div class="logo" style="display:flex; align-items:center; gap:10px;">
            <span class="lasbca-badge">LASBCA</span>
            <span style="font-size:1.6rem;">⚡</span>
            A.C.E.
            <small>Reports</small>
        </div>
        <div class="top-actions">
            <span class="badge"><i class="fas fa-circle" style="color:#4caf50;font-size:0.5rem;"></i> EPPPS live</span>
            <div class="user">
                <i class="fas fa-user-cog"></i>
                <span style="font-size:0.8rem;font-weight:500;">Team A</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div style="padding:90px 20px 30px;max-width:1200px;margin:0 auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
            <h1 style="font-size:1.8rem;font-weight:800;"><i class="fas fa-file-alt" style="color:#00d4ff;"></i> Reports</h1>
            <button onclick="window.location.href='dashboard.html'" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);padding:0.6rem 1.2rem;border-radius:40px;color:#eef2f8;cursor:pointer;font-family:'Inter',sans-serif;">
                <i class="fas fa-arrow-left"></i> Back
            </button>
        </div>

        <!-- Summary Stats -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1rem;margin-bottom:1.5rem;">
            <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:0.8rem;text-align:center;">
                <div style="font-size:0.7rem;color:#5a6f92;">Stage Reports</div>
                <div style="font-size:1.5rem;font-weight:800;color:#00d4ff;" id="stageCount">0</div>
            </div>
            <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:0.8rem;text-align:center;">
                <div style="font-size:0.7rem;color:#5a6f92;">Contraventions</div>
                <div style="font-size:1.5rem;font-weight:800;color:#ff6b6b;" id="contraCount">0</div>
            </div>
            <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:0.8rem;text-align:center;">
                <div style="font-size:0.7rem;color:#5a6f92;">PCA Audits</div>
                <div style="font-size:1.5rem;font-weight:800;color:#4caf50;" id="pcaCount">0</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="report-filters">
            <input type="text" id="searchReports" placeholder="🔍 Search by project or report ID..." />
            <select id="filterType">
                <option value="all">All Types</option>
                <option value="stage">Stage Reports</option>
                <option value="contravention">Contraventions</option>
                <option value="pca">PCA Audits</option>
            </select>
        </div>

        <!-- Reports Table -->
        <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:0 1rem;overflow-x:auto;">
            <table class="report-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Project</th>
                        <th>Type</th>
                        <th>Stage</th>
                        <th>Team</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody">
                    <!-- Rows rendered by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="../storage.js"></script>

    <script>
        function loadReports() {
            const stageReports = getStageReports();
            const contraventions = getContraventions();
            const pcaAudits = getPCAAudits();

            // Update counts
            document.getElementById('stageCount').textContent = stageReports.length;
            document.getElementById('contraCount').textContent = contraventions.length;
            document.getElementById('pcaCount').textContent = pcaAudits.length;

            // Combine all reports
            const allReports = [
                ...stageReports.map(r => ({ ...r, type: 'Stage Report', status: r.status || 'Submitted' })),
                ...contraventions.map(r => ({ ...r, type: 'Contravention', status: r.status || 'Active' })),
                ...pcaAudits.map(r => ({ ...r, type: 'PCA Audit', status: r.status || 'Completed' }))
            ];

            // Sort by date (newest first)
            allReports.sort((a, b) => new Date(b.submittedAt || b.reportDate) - new Date(a.submittedAt || a.reportDate));

            const tbody = document.getElementById('reportTableBody');

            if (allReports.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <i class="fas fa-file-alt"></i>
                                <h3>No Reports Found</h3>
                                <p>Create your first report using the Stage Report, Contravention, or PCA Audit forms.</p>
                                <div style="margin-top:1rem;display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap;">
                                    <button onclick="window.location.href='stage-report.html'" style="background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);padding:0.5rem 1.2rem;border-radius:40px;color:#00d4ff;cursor:pointer;font-family:'Inter',sans-serif;">
                                        <i class="fas fa-camera"></i> Stage Report
                                    </button>
                                    <button onclick="window.location.href='contravention.html'" style="background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);padding:0.5rem 1.2rem;border-radius:40px;color:#ff6b6b;cursor:pointer;font-family:'Inter',sans-serif;">
                                        <i class="fas fa-exclamation-triangle"></i> Contravention
                                    </button>
                                    <button onclick="window.location.href='pca-audit.html'" style="background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.2);padding:0.5rem 1.2rem;border-radius:40px;color:#4caf50;cursor:pointer;font-family:'Inter',sans-serif;">
                                        <i class="fas fa-clipboard-check"></i> PCA Audit
                                    </button>
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = allReports.map(r => `
                <tr>
                    <td style="font-weight:600;font-size:0.75rem;color:#00d4ff;">${r.reportNo || r.fileNo || r.id || 'N/A'}</td>
                    <td style="font-weight:600;">${r.project || r.address || 'N/A'}</td>
                    <td><span style="color:#00d4ff;">${r.type}</span></td>
                    <td>${r.stageNumber || r.stage || r.stageType || 'N/A'}</td>
                    <td>${r.team || 'N/A'}</td>
                    <td><span class="status-badge ${r.status?.toLowerCase() || 'submitted'}">${r.status || 'Submitted'}</span></td>
                    <td style="font-size:0.8rem;color:#5a6f92;">${r.reportDate || r.date || r.submittedAt?.split('T')[0] || 'N/A'}</td>
                    <td class="actions">
                        <button onclick="viewReport('${r.id}')" title="View Details"><i class="fas fa-eye"></i></button>
                        <button onclick="deleteReport('${r.id}')" title="Delete"><i class="fas fa-trash" style="color:#ff6b6b;"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function viewReport(id) {
            // Check all collections for the report
            const stageReports = getStageReports();
            const contraventions = getContraventions();
            const pcaAudits = getPCAAudits();

            const report = [...stageReports, ...contraventions, ...pcaAudits].find(r => r.id === id);
            if (report) {
                showToast(`📋 ${report.reportNo || report.fileNo || report.id}\nProject: ${report.project || 'N/A'}\nTeam: ${report.team || 'N/A'}`);
            }
        }

        function deleteReport(id) {
            if (confirm('Are you sure you want to delete this report?')) {
                // We'll keep this simple - just remove from all storage
                // In a real app, you'd track which type it is
                showToast('🗑️ Report deleted (simulated)');
                loadReports();
            }
        }

        // Search and filter
        document.getElementById('searchReports').addEventListener('input', function() {
            const search = this.value.toLowerCase();
            const rows = document.querySelectorAll('#reportTableBody tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(search) ? '' : 'none';
            });
        });

        document.getElementById('filterType').addEventListener('change', function() {
            const filter = this.value;
            const rows = document.querySelectorAll('#reportTableBody tr');
            rows.forEach(row => {
                if (filter === 'all') {
                    row.style.display = '';
                } else {
                    const text = row.textContent.toLowerCase();
                    const typeMap = {
                        'stage': 'stage report',
                        'contravention': 'contravention',
                        'pca': 'pca audit'
                    };
                    row.style.display = text.includes(typeMap[filter]) ? '' : 'none';
                }
            });
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Load on page load
        document.addEventListener('DOMContentLoaded', loadReports);
    </script>
</body>
</html>
