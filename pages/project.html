<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Projects - A.C.E.</title>
    <link rel="stylesheet" href="../styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .project-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 1.5rem;
            transition: 0.3s ease;
            cursor: pointer;
        }
        .project-card:hover {
            background: rgba(0, 212, 255, 0.03);
            border-color: rgba(0, 212, 255, 0.15);
            transform: translateY(-2px);
        }
        .project-card .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
        }
        .project-card .name {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .project-card .status {
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-active {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }
        .status-pending {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }
        .status-completed {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
        }
        .status-contravention {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
        }
        .project-card .details {
            font-size: 0.85rem;
            color: #889bc2;
            margin: 0.5rem 0;
        }
        .project-card .details i {
            width: 20px;
            color: #5a6f92;
        }
        .project-card .meta {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.75rem;
            color: #5a6f92;
        }
        .project-card .meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .project-card .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            margin-top: 0.8rem;
            overflow: hidden;
        }
        .project-card .progress-bar .fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #00d4ff, #0088cc);
            transition: width 0.5s ease;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: #141d2b;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 {
            margin-bottom: 1.5rem;
        }
        .modal-content .form-group {
            margin-bottom: 1rem;
        }
        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .modal-actions button {
            flex: 1;
            padding: 0.7rem;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-actions .cancel {
            background: rgba(255, 255, 255, 0.05);
            color: #eef2f8;
        }
        .modal-actions .save {
            background: linear-gradient(135deg, #00d4ff, #0088cc);
            color: #0b0f1a;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #5a6f92;
        }
        .empty-state i {
            font-size: 3rem;
            color: #00d4ff;
            opacity: 0.3;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Top Navigation -->
    <div class="top-bar" style="position:fixed;top:0;left:0;right:0;z-index:50;">
        <div class="logo">
            <span style="font-size:1.6rem;">⚡</span>
            A.C.E.
            <small>Projects</small>
        </div>
        <div class="top-actions">
            <span class="badge"><i class="fas fa-circle" style="color:#4caf50;font-size:0.5rem;"></i> EPPPS live</span>
            <div class="user">
                <i class="fas fa-user-cog"></i>
                <span style="font-size:0.8rem;font-weight:500;">Team A</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div style="padding:90px 20px 30px;max-width:1200px;margin:0 auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
            <h1 style="font-size:1.8rem;font-weight:800;"><i class="fas fa-building" style="color:#00d4ff;"></i> Projects</h1>
            <div style="display:flex;gap:0.8rem;flex-wrap:wrap;">
                <button onclick="window.location.href='dashboard.html'" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);padding:0.6rem 1.2rem;border-radius:40px;color:#eef2f8;cursor:pointer;font-family:'Inter',sans-serif;">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
                <button onclick="openModal()" style="background:linear-gradient(135deg,#00d4ff,#0088cc);border:none;padding:0.6rem 1.5rem;border-radius:40px;color:#0b0f1a;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">
                    <i class="fas fa-plus"></i> New Project
                </button>
            </div>
        </div>

        <!-- Search & Filter -->
        <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;">
            <input type="text" id="searchInput" placeholder="🔍 Search projects..." style="flex:1;padding:0.7rem 1rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:40px;color:#eef2f8;font-family:'Inter',sans-serif;min-width:200px;" />
            <select id="filterStatus" style="padding:0.7rem 1rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:40px;color:#eef2f8;font-family:'Inter',sans-serif;">
                <option value="all">All Status</option>
                <option value="active">Active</option>
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
                <option value="contravention">Contravention</option>
            </select>
        </div>

        <!-- Project Grid -->
        <div class="project-grid" id="projectGrid">
            <!-- Cards will be rendered here -->
        </div>
    </div>

    <!-- New Project Modal -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal-content">
            <h2><i class="fas fa-plus-circle" style="color:#00d4ff;"></i> New Project</h2>
            <form id="projectForm">
                <div class="form-group">
                    <label>Project Name <span class="required">*</span></label>
                    <input type="text" id="projectName" placeholder="e.g., Eko Tower Phase 2" required />
                </div>
                <div class="form-group">
                    <label>Location <span class="required">*</span></label>
                    <input type="text" id="projectLocation" placeholder="e.g., 12 Allen Avenue, Ikeja" required />
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="projectStatus">
                        <option value="active">Active</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                        <option value="contravention">Contravention</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="projectDescription" placeholder="Brief description of the project..." rows="3"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="save"><i class="fas fa-save"></i> Create Project</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        // Sample data
        let projects = [
            {
                id: 1,
                name: 'Eko Tower Phase 2',
                location: '12 Allen Avenue, Ikeja',
                status: 'active',
                description: 'Commercial high-rise development',
                stages: ['Ground Floor', '1st Floor', '2nd Floor'],
                lastReport: '2026-06-18',
                progress: 65
            },
            {
                id: 2,
                name: 'Victoria Island Plaza',
                location: '25 Ahmadu Bello Way, VI',
                status: 'pending',
                description: 'Mixed-use development',
                stages: ['Ground Floor'],
                lastReport: '2026-06-15',
                progress: 30
            },
            {
                id: 3,
                name: 'Surulere Estate',
                location: '5 Bode Thomas Street, Surulere',
                status: 'completed',
                description: 'Residential estate with 20 units',
                stages: ['Ground Floor', '1st Floor', '2nd Floor', 'Roof'],
                lastReport: '2026-05-30',
                progress: 100
            },
            {
                id: 4,
                name: 'Lekki Phase 1 Project',
                location: '3 Admiralty Way, Lekki',
                status: 'contravention',
                description: 'Luxury apartment complex',
                stages: ['Ground Floor', '1st Floor'],
                lastReport: '2026-06-12',
                progress: 55
            }
        ];

        let nextId = 5;

        // Render projects
        function renderProjects(filter = 'all', search = '') {
            const grid = document.getElementById('projectGrid');
            const filtered = projects.filter(p => {
                const statusMatch = filter === 'all' || p.status === filter;
                const searchMatch = p.name.toLowerCase().includes(search.toLowerCase()) ||
                    p.location.toLowerCase().includes(search.toLowerCase());
                return statusMatch && searchMatch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <i class="fas fa-folder-open"></i>
                        <h3>No projects found</h3>
                        <p>Create your first project to get started.</p>
                        <button onclick="openModal()" style="margin-top:1rem;background:linear-gradient(135deg,#00d4ff,#0088cc);border:none;padding:0.6rem 1.5rem;border-radius:40px;color:#0b0f1a;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">
                            <i class="fas fa-plus"></i> New Project
                        </button>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="project-card" onclick="viewProject(${p.id})">
                    <div class="header">
                        <div class="name">${p.name}</div>
                        <span class="status status-${p.status}">${p.status}</span>
                    </div>
                    <div class="details"><i class="fas fa-map-pin"></i> ${p.location}</div>
                    <div class="details" style="font-size:0.8rem;">${p.description}</div>
                    <div class="progress-bar">
                        <div class="fill" style="width:${p.progress}%;"></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:#5a6f92;margin-top:0.3rem;">
                        <span>Progress: ${p.progress}%</span>
                        <span>${p.stages.length} stages</span>
                    </div>
                    <div class="meta">
                        <span><i class="fas fa-calendar"></i> Last: ${p.lastReport}</span>
                        <span><i class="fas fa-clipboard-list"></i> ${p.stages.join(', ')}</span>
                    </div>
                </div>
            `).join('');
        }

        // View project (simple alert for now)
        function viewProject(id) {
            const p = projects.find(proj => proj.id === id);
            if (p) {
                showToast(`📋 ${p.name} - ${p.status.toUpperCase()}\n${p.location}\nProgress: ${p.progress}%`);
            }
        }

        // Modal functions
        function openModal() {
            document.getElementById('projectModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('projectModal').classList.remove('active');
            document.getElementById('projectForm').reset();
        }

        // Add new project
        document.getElementById('projectForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const newProject = {
                id: nextId++,
                name: document.getElementById('projectName').value.trim(),
                location: document.getElementById('projectLocation').value.trim(),
                status: document.getElementById('projectStatus').value,
                description: document.getElementById('projectDescription').value.trim() || 'No description',
                stages: ['Ground Floor'],
                lastReport: new Date().toISOString().split('T')[0],
                progress: 10
            };

            projects.unshift(newProject);
            renderProjects(
                document.getElementById('filterStatus').value,
                document.getElementById('searchInput').value
            );
            closeModal();
            showToast('✅ Project created successfully!');
        });

        // Search and filter
        document.getElementById('searchInput').addEventListener('input', function() {
            renderProjects(
                document.getElementById('filterStatus').value,
                this.value
            );
        });

        document.getElementById('filterStatus').addEventListener('change', function() {
            renderProjects(
                this.value,
                document.getElementById('searchInput').value
            );
        });

        // Close modal on overlay click
        document.getElementById('projectModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Toast function
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Initial render
        renderProjects();
    </script>
</body>
  </html>
